name: Duesheet
options:
  bundleIdPrefix: com.shimondeitel.duesheet
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Duesheet:
    type: application
    platform: iOS
    sources:
      - path: Duesheet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.duesheet
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Duesheet/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DuesheetTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DuesheetTests
      - path: Duesheet.storekit
    dependencies:
      - target: Duesheet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.duesheet.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DuesheetUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DuesheetUITests
    dependencies:
      - target: Duesheet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.duesheet.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Duesheet:
    build:
      targets:
        Duesheet: all
        DuesheetTests: [test]
        DuesheetUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Duesheet.storekit
    test:
      config: Debug
      storeKitConfiguration: Duesheet.storekit
      targets:
        - DuesheetTests
        - DuesheetUITests
    archive:
      config: Release
